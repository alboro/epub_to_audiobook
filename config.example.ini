; epub_to_audiobook — example configuration file
;
; HOW IT WORKS
; ============
; Settings are loaded in order (later sources override earlier ones):
;   1. Built-in defaults
;   2. Global user config  : ~/.config/epub_to_audiobook/config.ini
;   3. Per-book config     : <same folder as book>/<book stem>.ini
;                            or <same folder as book>/audiobook.ini
;   4. Explicit --config   : path passed on the command line
;   5. CLI arguments       : always win
;
; Copy this file to ~/.config/epub_to_audiobook/config.ini for your personal
; defaults, then create per-book overrides next to each book file.
;
; SECRETS & API KEYS
; ==================
; API keys can be stored here (the file is local and gitignored by default)
; OR passed via environment variables (.env or shell exports).
; Environment variables take precedence when read directly by a TTS provider
; (e.g. MS_TTS_KEY / MS_TTS_REGION for Azure, OPENAI_API_KEY for OpenAI).
; If both are set, the INI value is applied first, then env vars may override
; depending on provider implementation.
; Recommendation: store secrets in .env for shell-level reuse; store all other
; settings in INI.

; ─────────────────────────────────────────────────────────────────────────────
[general]
; mode = all           ; prepare  audio  package  all
; language = ru-RU     ; BCP-47 language tag (e.g. en-US, ru-RU)
; log = INFO           ; DEBUG  INFO  WARNING  ERROR  CRITICAL
; no_prompt = true     ; skip cost-confirmation prompt (good for automation)
; worker_count = 1     ; parallel chapter workers (1 = sequential)
; chapter_mode = toc_sections  ; documents  toc_sections
; newline_mode = double         ; single  double  none
; title_mode = auto             ; auto  tag_text  first_few
; output_folder =      ; override default output directory
; Note: use remove_endnotes / remove_reference_numbers normalizer steps
;       instead of deprecated parser flags.

; ─────────────────────────────────────────────────────────────────────────────
[tts]
; tts = openai         ; azure  openai  edge  piper  kokoro  qwen  gemini
; voice_name = reference_long
; output_format = wav  ; wav  mp3  ogg
; model_name = tts_models/multilingual/multi-dataset/xtts_v2
; speed = 1.0          ; OpenAI TTS only

; ─────────────────────────────────────────────────────────────────────────────
[tts.openai]
; openai_base_url = http://localhost:8020
; openai_api_key =
; openai_max_chars = 0               ; 0 = no local chunking (let server handle it)
; openai_enable_polling = true       ; use async job polling instead of streaming
; openai_submit_url = /v1/tts/jobs
; openai_status_url_template = /v1/tts/jobs/{job_id}
; openai_download_url_template = /v1/tts/jobs/{job_id}/audio
; openai_job_id_path = id
; openai_job_status_path = status
; openai_poll_interval = 5           ; seconds between status checks
; openai_poll_timeout = 14400        ; max seconds to wait for a job

; ─────────────────────────────────────────────────────────────────────────────
[tts.azure]
; voice_name = ru-RU-DmitryNeural

; ─────────────────────────────────────────────────────────────────────────────
[tts.edge]
; voice_name = ru-RU-DmitryNeural
; voice_rate =
; voice_volume =
; voice_pitch =
; proxy =

; ─────────────────────────────────────────────────────────────────────────────
[tts.azure_edge]
; break_duration = 1250

; ─────────────────────────────────────────────────────────────────────────────
[tts.kokoro]
; kokoro_base_url = http://localhost:8880
; kokoro_volume_multiplier = 1.0

; ─────────────────────────────────────────────────────────────────────────────
[tts.piper]
; voice_name = ru_RU-ruslan-medium

; ─────────────────────────────────────────────────────────────────────────────
[normalize]
; normalize = true
;
; Produce diff files showing what each normalizer step changed.
; Default: false (resource-intensive, useful for debugging).
; normalize_log_changes = false
;
; ── Normalizer pipeline ───────────────────────────────────────────────────
; Comma-separated list of steps. Executed in order.
;
; Available steps (canonical names):
;
;   Book cleanup:
;     remove_endnotes               — strip footnote/endnote blocks
;     remove_reference_numbers      — strip inline reference numbers [1]
;
;   Text normalisation:
;     simple_symbols                — replace fancy quotes, dashes, ellipsis
;     ru_initials                   — expand "А. С. Пушкин" → "А Эс Пушкин"
;     ru_abbreviations              — expand Russian abbreviations
;     ru_numbers                    — numbers → words (Russian)
;
;   Deterministic stress:
;     ru_proper_names               — stress capitalised names via tsnorm
;     ru_tsnorm                     — full tsnorm stress assignment
;
;   LLM refinement (skipped gracefully if no LLM configured):
;     ru_llm_stress_ambiguity       — resolve homograph stress via LLM
;     ru_llm_proper_nouns_pronunciation — choose name pronunciation via LLM
;
;   TTS finishing:
;     tts_pronunciation_overrides   — apply word→replacement substitutions
;     tts_llm_safe_split            — split long sentences; optional LLM
;                                     punctuation refinement
;
;   Deprecated aliases (still work, but emit a warning):
;     ru_stress_ambiguity           → ru_llm_stress_ambiguity
;     ru_proper_nouns               → ru_proper_names
;     ru_proper_nouns_pronunciation → ru_llm_proper_nouns_pronunciation
;     tts_safe_split                → tts_llm_safe_split
;
; Minimal chain (no LLM needed):
; normalize_steps = simple_symbols,ru_initials,ru_numbers,tts_llm_safe_split
;
; Full chain — recommended order:
; normalize_steps = remove_endnotes,remove_reference_numbers,simple_symbols,ru_initials,ru_abbreviations,ru_numbers,ru_proper_names,ru_tsnorm,ru_llm_stress_ambiguity,ru_llm_proper_nouns_pronunciation,tts_pronunciation_overrides,tts_llm_safe_split

; ── LLM provider (used by ru_llm_* and openai steps) ─────────────────────
; normalize_provider = openai
; normalize_model = gpt-4o-mini
; normalize_base_url = http://localhost:1234/v1
; normalize_api_key =
; normalize_max_chars = 6000     ; max chars per LLM request batch

; ── LLM system prompts ────────────────────────────────────────────────────
; Global system prompt file (used by openai normalizer step):
; normalize_system_prompt_file = /path/to/ru_prompt.txt
;
; Per-step prompt overrides (inline text, replaces built-in default):
; normalize_stress_ambiguity_system_prompt =
; normalize_safe_split_system_prompt =

; ── Sentence splitting ────────────────────────────────────────────────────
; normalize_tts_safe_max_chars = 180   ; max chars per TTS sentence

; ── Pronunciation ─────────────────────────────────────────────────────────
; Shared SQLite lexicon DB (auto-created under project dir if omitted):
; normalize_pronunciation_lexicon_db = /path/to/lexicon.db
;
; Inline TTS pronunciation overrides (word=replacement, comma-separated).
; When set, REPLACES built-in defaults (отель→отэль family) entirely.
; normalize_tts_pronunciation_overrides_words = отель=отэль,отеля=отэля
;
; External file with overrides (source==replacement per line):
; normalize_tts_pronunciation_overrides_file = /path/to/overrides.txt
;
; Stress paradox words — words TTS reads worse when stressed.
; Plain word = strip all stress marks from all forms.
; Word with stress mark = enforce that exact pronunciation for that form;
; all other forms get stress stripped.
; All inflected forms handled automatically via pymorphy3.
; normalize_stress_paradox_words = Томас, Пейн, чуде́с, чудеса́

; ── tsnorm_ru options ─────────────────────────────────────────────────────
; normalize_tsnorm_stress_yo = true            ; force Ё where possible
; normalize_tsnorm_stress_monosyllabic = false
; normalize_tsnorm_min_word_length = 2

; ─────────────────────────────────────────────────────────────────────────────
[m4b]
; package_m4b = true     ; assemble final .m4b after audio mode
; m4b_bitrate = 64k
; m4b_filename =         ; override output filename (stem only)
; ffmpeg_path = ffmpeg
;
; chunked_audio = true
;   Generate one WAV file PER SENTENCE instead of one per chapter.
;   Enables sentence-level resume: already-synthesised sentences are skipped
;   on re-run (identified by content hash + voice + model).
;   Chunks saved to wav/NNN/chunks/, then concatenated into the chapter file.
;   Recommended when using a slow or unreliable TTS backend (e.g. XTTS jobs).
; chunked_audio = true
