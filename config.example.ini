; epub_to_audiobook — example configuration file
;
; HOW IT WORKS
; ============
; Settings are loaded in order (later sources override earlier ones):
;   1. Built-in defaults
;   2. Global user config  : ~/.config/epub_to_audiobook/config.ini
;   3. Per-book config     : <same folder as book>/<book stem>.ini
;                            or <same folder as book>/audiobook.ini
;   4. Explicit --config   : path passed on the command line
;   5. CLI arguments       : always win
;
; Copy this file to ~/.config/epub_to_audiobook/config.ini for your personal
; defaults, then create per-book overrides next to each book file.
;
; SECRETS & API KEYS
; ==================
; API keys can be stored here (the file is local and gitignored by default)
; OR passed via environment variables (.env or shell exports).
; Environment variables take precedence when read directly by a TTS provider
; (e.g. MS_TTS_KEY / MS_TTS_REGION for Azure, OPENAI_API_KEY for OpenAI).
; If both are set, the INI value is applied first, then env vars may override
; depending on provider implementation.
; Recommendation: store secrets in .env for shell-level reuse; store all other
; settings in INI.

; ─────────────────────────────────────────────────────────────────────────────
[general]
; mode = all          ; prepare | audio | package | all
; language = ru-RU
; log = INFO          ; DEBUG | INFO | WARNING | ERROR | CRITICAL
; no_prompt = true    ; skip cost-confirmation prompt (good for automation)
; worker_count = 1
; chapter_mode = toc_sections  ; documents | toc_sections
; newline_mode = double         ; single | double | none
; title_mode = auto             ; auto | tag_text | first_few
; Note: use remove_endnotes / remove_reference_numbers as normalizer steps instead of parser flags

; ─────────────────────────────────────────────────────────────────────────────
[tts]
; tts = openai        ; azure | openai | edge | piper | kokoro | qwen | gemini
; voice_name = reference_long
; output_format = wav
; model_name = tts_models/multilingual/multi-dataset/xtts_v2
; speed = 1.0         ; OpenAI TTS only

; ─────────────────────────────────────────────────────────────────────────────
[tts.openai]
; openai_base_url = http://localhost:8020
; openai_api_key =
; openai_max_chars = 0         ; 0 = no local chunking (let the server handle it)
; openai_enable_polling = true
; openai_submit_url = /v1/tts/jobs
; openai_status_url_template = /v1/tts/jobs/{job_id}
; openai_download_url_template = /v1/tts/jobs/{job_id}/audio
; openai_job_id_path = id
; openai_job_status_path = status
; openai_poll_interval = 5
; openai_poll_timeout = 14400

; ─────────────────────────────────────────────────────────────────────────────
[tts.edge]
; voice_rate =
; voice_volume =
; voice_pitch =
; proxy =

; ─────────────────────────────────────────────────────────────────────────────
[tts.azure_edge]
; break_duration = 1250

; ─────────────────────────────────────────────────────────────────────────────
[tts.kokoro]
; kokoro_base_url = http://localhost:8880
; kokoro_volume_multiplier = 1.0

; ─────────────────────────────────────────────────────────────────────────────
[normalize]
; normalize = true
; normalize_steps = simple_symbols,ru_initials,ru_numbers,ru_llm_stress_ambiguity,ru_llm_proper_nouns,tts_safe_split
; Available steps: simple_symbols, remove_endnotes, remove_reference_numbers,
;   ru_initials, ru_abbreviations, tts_pronunciation_overrides, ru_stress_words,
;   ru_llm_stress_ambiguity, ru_proper_nouns, ru_llm_proper_nouns, ru_tsnorm,
;   tts_safe_split, ru_numbers, openai
; normalize_model = gpt-4o-mini
; normalize_base_url = http://localhost:1234/v1
; normalize_api_key =
; normalize_max_chars = 6000
; normalize_tts_safe_max_chars = 180
;
; LLM system prompt — paste the prompt inline here, or point to a file:
; normalize_system_prompt_file = /path/to/ru_prompt.txt
;
; Pronunciation lexicon (shared SQLite, auto-created if omitted):
; normalize_pronunciation_lexicon_db = /path/to/lexicon.db
;
; tsnorm_ru options:
; normalize_tsnorm_stress_yo = true
; normalize_tsnorm_stress_monosyllabic = false
; normalize_tsnorm_min_word_length = 2

; ─────────────────────────────────────────────────────────────────────────────
[m4b]
; package_m4b = true
; chunked_audio = true
; m4b_bitrate = 64k
; ffmpeg_path = ffmpeg

